name: Amp Smoke (real CLI schema check)

# Path-gated CI smoke job that calls real `amp --execute --stream-json`
# against a one-line prompt and asserts the schema fields mala depends on
# are present. Catches upstream stream-json schema drift on PRs that
# touch the Amp client / plugin / plan paths.
#
# Plan: plans/2026-04-29-amp-provider-plan.md L66-L70, L870-L876, L913 (AC#12).
#
# Gating:
#   * `paths:` filters keep this job off unrelated PRs.
#   * The job is also gated on the `AMP_API_KEY` repository secret. When
#     the secret is absent (e.g. PRs from forks), the gate-check job
#     succeeds with an explanatory log and the smoke job is skipped, so
#     the overall workflow status stays green.

on:
  pull_request:
    paths:
      - 'src/infra/clients/amp_*'
      - 'plugins/amp/**'
      - 'tests/smoke/test_amp_real_cli.py'
      - 'plans/2026-04-29-amp-provider-plan.md'
      - '.github/workflows/amp-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'src/infra/clients/amp_*'
      - 'plugins/amp/**'
      - 'tests/smoke/test_amp_real_cli.py'
      - 'plans/2026-04-29-amp-provider-plan.md'
      - '.github/workflows/amp-smoke.yml'

jobs:
  gate:
    name: Check AMP_API_KEY availability
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - name: Check secret presence
        id: check
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          if [ -n "$AMP_API_KEY" ]; then
            echo "AMP_API_KEY is set; smoke job will run."
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "AMP_API_KEY is not set (likely a fork PR or unconfigured repo)."
            echo "Skipping the real-Amp smoke job; this is expected and not a failure."
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    name: amp --execute --stream-json schema check
    needs: gate
    if: needs.gate.outputs.has_secret == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install uv. Pinned to v4 to mirror .github/workflows/release.yml.
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync project dependencies
        run: uv sync --frozen

      - name: Install Amp CLI (binary)
        run: |
          set -euo pipefail
          # The plan documents `amp` as a user prerequisite installed via
          # the binary install path. Mirror that path in CI: download the
          # official installer from ampcode.com (TODO maintainers: pin a
          # specific version when one is published).
          curl -fsSL https://ampcode.com/install.sh | bash
          # The installer drops the binary into ~/.local/bin (or similar);
          # ensure it is on PATH for subsequent steps.
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Report observed Amp version
        run: |
          set -euo pipefail
          echo "::group::amp --version"
          amp --version || echo "(amp --version failed; smoke test will skip)"
          echo "::endgroup::"

      - name: Run smoke test
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          set -euo pipefail
          uv run pytest tests/smoke/test_amp_real_cli.py -v -m smoke -s
